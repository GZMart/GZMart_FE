# Tên của workflow, sẽ hiển thị trong tab "Actions" trên GitHub
name: Deploy GZMart to Vercel

# Điều kiện để kích hoạt workflow: chạy sau khi test workflow hoàn thành thành công trên main
on:
  workflow_run:
    workflows:
      - 'Format & Build GZMart'
    types:
      - completed
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      # Bước 1: Lấy mã nguồn về máy ảo
      - name: Checkout code
        uses: actions/checkout@v4

      # Bước 1.5: Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      # Bước 2: Cài đặt Vercel CLI phiên bản mới nhất
      - name: Install latest Vercel CLI
        run: npm install -g vercel@latest

      # Bước 3: Deploy dự án lên Vercel
      - name: Deploy GZMart to Vercel
        uses: amondnet/vercel-action@v25
        with:
          # Token Vercel để xác thực
          vercel-token: ${{ secrets.VERCEL_TOKEN }}

          # Token GitHub để Vercel liên kết commit (có sẵn, không cần tạo)
          github-token: ${{ secrets.GITHUB_TOKEN }}

          # Argument để báo cho Vercel đây là bản deploy production
          vercel-args: '--prod'

          # ID của tài khoản Vercel (cá nhân hoặc team)
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID}}

          # ID của dự án trên Vercel
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID}}
